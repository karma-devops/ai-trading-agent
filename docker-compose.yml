# ============================================================================
# AI Trading Agent - HyperLiquid (Private)
# docker-compose.yml for local / EasyPanel-style deployment
# ============================================================================
#
# HOW TO USE
# ----------
# 1. Copy .env_example to .env and fill in the required values.
# 2. Run: docker compose up -d
# 3. Open http://localhost:5000
#
# In EasyPanel you usually don't need this file; upload the ZIP and set
# the environment variables in the EasyPanel UI.
# ============================================================================

services:
  ai-trading-agent:
    build: .
    container_name: ai-trading-agent
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./temp_data:/app/temp_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
